services:
  gotrue:
    image: supabase/gotrue:v2.106.0
    container_name: cevop-gotrue
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      PORT: 9999
      API_EXTERNAL_URL: http://localhost:54321/auth/v1
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_DB_DRIVER: postgres
      DB_DRIVER: postgres
      DATABASE_URL: postgres://cevop:cevop@host.docker.internal:5435/cevop?sslmode=disable
      GOTRUE_JWT_SECRET: cevop_local_dev_jwt_secret_change_me
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_EXTERNAL_PHONE_ENABLED: "false"
      DISABLE_SIGNUP: "false"
      GOTRUE_MAILER_AUTOCONFIRM: "true"

  postgrest:
    image: postgrest/postgrest:v12.2.8
    container_name: cevop-postgrest
    environment:
      PGRST_DB_URI: postgres://cevop:cevop@host.docker.internal:5435/cevop
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: cevop_local_dev_jwt_secret_change_me
    ports:
      - "3001:3000"

  gateway:
    image: nginx:1.27-alpine
    container_name: cevop-rest-gateway
    depends_on:
      - gotrue
      - postgrest
    ports:
      - "54321:80"
    volumes:
      - ./docker/local-nginx.conf:/etc/nginx/conf.d/default.conf:ro
